            <div class="container-fluid">
                <a class="navbar-brand text-black" href="index.html">

                    </div>
                    <div class="offcanvas-body justify-content-end">
                        <ul class="navbar-nav">
                            <li class="nav-item d-none d-md-none d-lg-block">
                                <a class="nav-link text-black" href="about_us.html">About Us</a>
                            </li>
                            <li class="nav-item d-none d-md-none d-lg-block">
                                <a class="nav-link text-black"
                                    href="https://sites.google.com/view/uganda-national-anthem-app">Privacy Policy</a>
                            </li>
                            <li class="nav-item d-block d-md-block d-lg-none">

    </header>
    <main style="display: flex; flex-direction: row;">
        <img src="assets/images/ug_flag2.png" class="d-none d-md-none d-lg-block" width="200px"
            style="position: absolute; margin-top: 40px; margin-left: 220px; opacity: 0.75;">
        <div class="container index-container">
            <img src="assets/images/ug_flag2.png" class="d-block d-md-block d-lg-none" width="300px"
                style="position: absolute; margin-top: 70px; opacity: 0.3;">
            <div style="z-index: 1000;" class="index-container">
                <button id="playBtn" class="btn mb-4">
                    <img id="icon" src="assets/images/Play.png" width="20px"> </button>
                <audio id="audio" src="assets/audio/Uganda National Anthem.mp3"></audio>
                <button class="btn mb-4 fw-bold" type="button"><a href="lyrics.html"
                        style="z-index: 1000;">Lyrics</a></button>
                <button class="btn mb-4 fw-bold" type="button"><a href="sing_along.html">Sing

                        Song</a></button>

        <img src="assets/images/ug_flag2.png" class="d-none d-md-none d-lg-block" width="200px" class="bg-img" style="position: absolute;

<script src="assets/bootstrap.js"></script>
<script src="assets/bootstrap.bundle.min.js"></script>
<script>
    const audio = document.getElementById("audio");
    const btn = document.getElementById("playBtn");
    const icon = document.getElementById("icon")

    btn.addEventListener("click", () => {
        if (audio.paused) {
            audio.play();
            icon.src = "assets/images/Pause.png";
        } else {
            audio.pause();
            icon.src = "assets/images/Play.png";
        }
    });
</script>

</html>
